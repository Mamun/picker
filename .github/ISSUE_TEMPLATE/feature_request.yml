name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make StockIQ better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Is this related to a problem?
      description: Describe the gap or friction you experience today.
      placeholder: "I find it hard to quickly compare multiple tickers side-by-side because..."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature you'd like
      description: What would you like to see in StockIQ?
      placeholder: "Add a multi-ticker comparison view that shows all MAs and RSI on the same chart..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches or workarounds you've tried?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      multiple: true
      options:
        - Technical indicators (MA, RSI, Fibonacci, patterns)
        - Screeners (bounce, squeeze, Munger, strong buy/sell)
        - SPY dashboard / gap tracking
        - AI forecast
        - Charts / UI
        - Performance / caching
        - Data sources
        - Documentation
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, screenshots, or links to similar tools are very welcome.
