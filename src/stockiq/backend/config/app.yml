# Backend data parameters — used by the backend service for calculations and data fetching.
# Visual/UI parameters (colors, patterns) live in config/app.yml (frontend).

# ── Moving averages ────────────────────────────────────────────────────────────
moving_averages:
  periods: [5, 20, 50, 100, 200]

# ── Fibonacci retracement ──────────────────────────────────────────────────────
fibonacci:
  levels: [0.0, 0.236, 0.382, 0.5, 0.618, 0.786, 1.0]

