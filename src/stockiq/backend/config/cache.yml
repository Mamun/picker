# Cache TTL (time-to-live) in seconds
# Controls how long Streamlit caches each data-fetch function.
# Change a value here and restart the app — no code changes needed.

market:
  fetch_spx_quote: 60           # Live SPY price — refresh every minute
  fetch_spx_intraday: 120       # SPY bars — refresh every 2 minutes
  fetch_vix_ohlc: 3600          # VIX OHLC — refresh hourly
  fetch_vix_history: 3600       # SPY + VIX dual-axis history — refresh hourly
  fetch_index_snapshot: 120     # Major indices strip — refresh every 2 minutes
  fetch_put_call_ratio: 3600         # SPY options put/call ratio — refresh hourly
  fetch_spy_options_data: 900        # SPY options chain (OI, max pain) — refresh every 15 min
  fetch_spy_options_data_cboe: 900   # CBOE fallback options chain — refresh every 15 min
  fetch_put_call_ratio_cboe: 3600    # CBOE fallback put/call ratio — refresh hourly

screeners:
  fetch_spx_candle_momentum_scan: 3600    # Weekly/monthly candle screener — hourly
  fetch_spx_bounce_radar_scan: 1800       # MA200 bounce radar — 30 min (price-sensitive)
  fetch_spx_squeeze_scan: 3600            # Short squeeze — hourly (RSI moves intraday)
  fetch_spx_munger_scan: 43200            # Munger quality — 12 h (fundamentals are quarterly)
  fetch_spx_strong_buy_scan: 21600        # Analyst consensus buy — 6 h (ratings change weekly)
  fetch_spx_strong_sell_scan: 21600       # Analyst consensus sell — 6 h
  fetch_nasdaq_rsi_scan: 1800             # NASDAQ-100 RSI — 30 min
  fetch_nasdaq_premarket_scan: 300        # Premarket movers — 5 min (prices change rapidly)
  fetch_nasdaq_premarket_history: 3600    # 7-day daily close history — hourly
  fetch_etf_scan: 900                     # ETF scanner — 15 min

ai:
  fetch_ai_prediction: 3600     # Claude AI forecast — refresh hourly
